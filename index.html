<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>施工時間軸</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; background: #F7F6F3; color: #1a1a18; min-height: 100vh; }

  /* ── 密碼畫面 ── */
  #lock-screen {
    position: fixed; inset: 0; background: #F7F6F3;
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .lock-card {
    background: #fff; border: 0.5px solid #D3D1C7; border-radius: 16px;
    padding: 36px 32px; width: 320px; text-align: center;
  }
  .lock-icon { font-size: 32px; margin-bottom: 14px; }
  .lock-card h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  .lock-card p  { font-size: 13px; color: #888780; margin-bottom: 20px; }
  .lock-card input {
    width: 100%; padding: 10px 14px; font-family: inherit; font-size: 15px;
    border: 0.5px solid #D3D1C7; border-radius: 8px; outline: none;
    text-align: center; letter-spacing: 3px; background: #FAFAF8;
    transition: border-color .15s;
  }
  .lock-card input:focus { border-color: #888780; background: #fff; }
  .lock-card input.error { border-color: #E24B4A; background: #FCEBEB; animation: shake .3s; }
  .lock-btn {
    width: 100%; margin-top: 12px; padding: 11px; font-family: inherit;
    font-size: 14px; font-weight: 500; background: #1a1a18; color: #fff;
    border: none; border-radius: 8px; cursor: pointer; transition: background .15s;
  }
  .lock-btn:hover { background: #3d3d3a; }
  .lock-err { font-size: 12px; color: #A32D2D; margin-top: 8px; min-height: 18px; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  /* ── App ── */
  #app { display: none; }
  .header { padding: 20px 28px 16px; border-bottom: 0.5px solid #D3D1C7; background: #fff; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-left h1 { font-size: 19px; font-weight: 600; }
  .header-left p  { font-size: 12px; color: #888780; margin-top: 2px; }
  .btn-lock { font-size: 12px; padding: 4px 12px; border-radius: 20px; background: #F1EFE8; color: #5F5E5A; border: 0.5px solid #D3D1C7; cursor: pointer; font-family: inherit; }
  .btn-lock:hover { background: #E8E6E0; }

  .layout { display: flex; min-height: calc(100vh - 65px); }
  .sidebar { width: 290px; min-width: 290px; background: #fff; border-right: 0.5px solid #D3D1C7; padding: 18px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
  .sidebar h2 { font-size: 13px; font-weight: 600; padding-bottom: 10px; border-bottom: 0.5px solid #E8E6E0; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 500; color: #5F5E5A; text-transform: uppercase; letter-spacing: .4px; }
  .field input, .field select, .field textarea {
    font-family: inherit; font-size: 14px; padding: 7px 10px;
    border: 0.5px solid #D3D1C7; border-radius: 8px; background: #FAFAF8; color: #1a1a18; outline: none; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #888780; background: #fff; }
  .field textarea { resize: vertical; min-height: 60px; }
  .btn-primary { padding: 10px; font-family: inherit; font-size: 14px; font-weight: 500; background: #1a1a18; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background .15s; }
  .btn-primary:hover { background: #3d3d3a; }
  .btn-secondary { padding: 8px; font-family: inherit; font-size: 13px; color: #888780; background: none; border: 0.5px solid #D3D1C7; border-radius: 8px; cursor: pointer; }
  .btn-secondary:hover { background: #F1EFE8; }

  .main { flex: 1; padding: 24px 36px; overflow-y: auto; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 0.5px solid #E8E6E0; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #5F5E5A; }
  .legend-dot  { width: 9px; height: 9px; border-radius: 50%; }

  .tl-item { display: flex; margin-bottom: 18px; }
  .tl-left { width: 105px; min-width: 105px; padding-right: 12px; padding-top: 13px; text-align: right; }
  .tl-date    { font-size: 14px; font-weight: 600; color: #1a1a18; line-height: 1.3; }
  .tl-weather { font-size: 12px; color: #888780; margin-top: 2px; }
  .tl-spine   { display: flex; flex-direction: column; align-items: center; width: 22px; min-width: 22px; }
  .tl-line    { width: 2px; flex: 1; min-height: 14px; background: #D3D1C7; }
  .tl-line.hidden { opacity: 0; }
  .tl-dot     { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 2.5px solid #F7F6F3; }
  .tl-card    { flex: 1; margin: 6px 0 6px 12px; padding: 11px 13px; background: #fff; border: 0.5px solid #D3D1C7; border-radius: 10px; transition: border-color .15s; }
  .tl-card:hover { border-color: #888780; }
  .tl-card.editing { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.1); }
  .card-top   { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .badge      { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
  .card-actions { margin-left: auto; display: flex; gap: 5px; opacity: 0; transition: opacity .15s; }
  .tl-card:hover .card-actions { opacity: 1; }
  .btn-sm     { font-size: 11px; padding: 2px 8px; border-radius: 6px; cursor: pointer; font-family: inherit; border: 0.5px solid #D3D1C7; background: #F7F6F3; color: #5F5E5A; }
  .btn-sm.edit:hover { background: #E6F1FB; color: #185FA5; border-color: #B5D4F4; }
  .btn-sm.del:hover  { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
  .card-title { font-size: 15px; font-weight: 600; color: #1a1a18; line-height: 1.4; margin-bottom: 2px; }
  .card-sub   { font-size: 13px; color: #5F5E5A; line-height: 1.5; }
  .card-alert { margin-top: 7px; padding: 6px 10px 6px 11px; font-size: 12px; line-height: 1.5; }
  .alert-warn  { background: #FAEEDA; color: #633806; border-left: 3px solid #EF9F27; }
  .alert-issue { background: #FCEBEB; color: #791F1F; border-left: 3px solid #E24B4A; }

  .s-normal    { background:#E6F1FB; color:#185FA5; }
  .s-milestone { background:#EAF3DE; color:#3B6D11; }
  .s-warn      { background:#FAEEDA; color:#854F0B; }
  .s-pending   { background:#FAEEDA; color:#854F0B; }
  .s-issue     { background:#FCEBEB; color:#A32D2D; }
  .dot-normal    { background:#378ADD; }
  .dot-milestone { background:#1D9E75; }
  .dot-warn      { background:#EF9F27; }
  .dot-pending   { background:#EF9F27; }
  .dot-issue     { background:#E24B4A; }
  .empty { text-align: center; padding: 60px 20px; color: #888780; font-size: 14px; }
</style>
</head>
<body>

<!-- 密碼畫面 -->
<div id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <h2>施工時間軸</h2>
    <p>請輸入密碼以繼續</p>
    <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="lock-btn" onclick="checkPw()">進入</button>
    <div class="lock-err" id="pw-err"></div>
  </div>
</div>

<!-- 主畫面 -->
<div id="app">
  <div class="header">
    <div class="header-left">
      <h1>施工及監造工作回報</h1>
      <p>台中電廠</p>
    </div>
    <button class="btn-lock" onclick="lockApp()">🔒 登出</button>
  </div>

  <div class="layout">
    <div class="sidebar">
      <h2 id="form-title">＋ 新增工項</h2>
      <div class="field"><label>施工日期</label><input type="date" id="f-date"></div>
      <div class="field">
        <label>天氣</label>
        <select id="f-weather">
          <option value="晴">晴</option><option value="陰">陰</option>
          <option value="雨">雨</option><option value="豪雨">豪雨</option>
        </select>
      </div>
      <div class="field">
        <label>狀態</label>
        <select id="f-status">
          <option value="normal">正常施工</option>
          <option value="milestone">里程碑／進展</option>
          <option value="warn">待注意</option>
          <option value="pending">待決議</option>
          <option value="issue">異常／已開單</option>
        </select>
      </div>
      <div class="field"><label>工項說明</label><textarea id="f-title" placeholder="例：沉砂池開挖、防溢座施作"></textarea></div>
      <div class="field"><label>出工人數</label><input type="text" id="f-sub" placeholder="例：出工 13人（施工 9、管理 4）"></div>
      <div class="field"><label>異常／備注（選填）</label><textarea id="f-alert" placeholder="如有異常或待追蹤事項請填寫"></textarea></div>
      <button class="btn-primary" id="btn-submit" onclick="submitEntry()">新增到時間軸</button>
      <button class="btn-secondary" id="btn-cancel" onclick="cancelEdit()" style="display:none">取消編輯</button>
    </div>

    <div class="main">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>里程碑／進展</div>
        <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>正常施工</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>待注意／待決議</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div>異常／已開單</div>
      </div>
      <div id="timeline"></div>
    </div>
  </div>
</div>

<script>
// ── 請在這裡修改你的密碼 ──────────────────────
const PASSWORD = 'taichung2026';
// ─────────────────────────────────────────────

const BADGE = { normal:'正常施工', milestone:'里程碑', warn:'待注意', pending:'待決議', issue:'異常' };
const STORAGE_KEY = 'construction_tl';
let entries = [];
let editingId = null;

function checkPw() {
  const val = document.getElementById('pw-input').value;
  const inp = document.getElementById('pw-input');
  if (val === PASSWORD) {
    sessionStorage.setItem('tl_auth', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadData(); render();
  } else {
    document.getElementById('pw-err').textContent = '密碼錯誤，請再試一次';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 500);
  }
}

function lockApp() {
  sessionStorage.removeItem('tl_auth');
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').textContent = '';
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    entries = raw ? JSON.parse(raw) : getDefaultData();
    if (!raw) saveData();
  } catch(e) { entries = getDefaultData(); }
}

function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
}

function submitEntry() {
  const date    = document.getElementById('f-date').value;
  const weather = document.getElementById('f-weather').value;
  const status  = document.getElementById('f-status').value;
  const title   = document.getElementById('f-title').value.trim();
  const sub     = document.getElementById('f-sub').value.trim();
  const alertTx = document.getElementById('f-alert').value.trim();
  if (!date || !title) { alert('請填寫日期和工項說明'); return; }

  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx !== -1) entries[idx] = { id: editingId, date, weather, status, title, sub, alert: alertTx };
    editingId = null;
    document.getElementById('form-title').textContent = '＋ 新增工項';
    document.getElementById('btn-submit').textContent = '新增到時間軸';
    document.getElementById('btn-cancel').style.display = 'none';
  } else {
    entries.push({ id: uid(), date, weather, status, title, sub, alert: alertTx });
  }
  saveData(); resetForm(); render();
}

function resetForm() {
  ['f-date','f-title','f-sub','f-alert'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'normal';
  document.getElementById('f-weather').value = '晴';
}

function editEntry(id) {
  const e = entries.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  document.getElementById('f-date').value    = e.date;
  document.getElementById('f-weather').value = e.weather || '晴';
  document.getElementById('f-status').value  = e.status;
  document.getElementById('f-title').value   = e.title;
  document.getElementById('f-sub').value     = e.sub || '';
  document.getElementById('f-alert').value   = e.alert || '';
  document.getElementById('form-title').textContent = '✏️ 編輯工項';
  document.getElementById('btn-submit').textContent = '儲存變更';
  document.getElementById('btn-cancel').style.display = 'block';
  render();
  document.querySelector('.sidebar').scrollTop = 0;
}

function cancelEdit() {
  editingId = null; resetForm();
  document.getElementById('form-title').textContent = '＋ 新增工項';
  document.getElementById('btn-submit').textContent = '新增到時間軸';
  document.getElementById('btn-cancel').style.display = 'none';
  render();
}

function deleteEntry(id) {
  if (!confirm('確定要刪除這筆記錄嗎？')) return;
  entries = entries.filter(e => e.id !== id);
  if (editingId === id) cancelEdit();
  saveData(); render();
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return y + '/' + m.replace(/^0/,'') + '/' + day.replace(/^0/,'');
}

function render() {
  const sorted = [...entries].sort((a,b) => a.date.localeCompare(b.date));
  const tl = document.getElementById('timeline');
  if (!sorted.length) { tl.innerHTML = '<div class="empty">還沒有任何工項，從左側新增第一筆吧！</div>'; return; }
  tl.innerHTML = sorted.map((e,i) => {
    const alertCls = e.status === 'issue' ? 'alert-issue' : 'alert-warn';
    return `<div class="tl-item">
      <div class="tl-left">
        <div class="tl-date">${formatDate(e.date)}</div>
        <div class="tl-weather">${e.weather||''}</div>
      </div>
      <div class="tl-spine">
        <div class="tl-line${i===0?' hidden':''}"></div>
        <div class="tl-dot dot-${e.status}"></div>
        <div class="tl-line${i===sorted.length-1?' hidden':''}"></div>
      </div>
      <div class="tl-card${e.id===editingId?' editing':''}">
        <div class="card-top">
          <span class="badge s-${e.status}">${BADGE[e.status]||e.status}</span>
          <div class="card-actions">
            <button class="btn-sm edit" onclick="editEntry('${e.id}')">編輯</button>
            <button class="btn-sm del"  onclick="deleteEntry('${e.id}')">刪除</button>
          </div>
        </div>
        <div class="card-title">${e.title.replace(/\n/g,'<br>')}</div>
        ${e.sub   ? `<div class="card-sub">${e.sub}</div>` : ''}
        ${e.alert ? `<div class="card-alert ${alertCls}">${e.alert.replace(/\n/g,'<br>')}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function getDefaultData() {
  return [
    { id:uid(), date:'2026-02-11', weather:'晴', status:'milestone', title:'洗車台材料進場自檢', sub:'出工 7人（施工 3、管理 4）', alert:'' },
    { id:uid(), date:'2026-03-02', weather:'晴', status:'issue',     title:'圍籬施工／門柱基礎灌漿完成', sub:'出工 8人（施工 4、管理 4）', alert:'灌漿作業未依核定計畫執行材料進場檢驗程序。出工人數與 TBM-KY 簽到記錄不符。' },
    { id:uid(), date:'2026-03-05', weather:'陰', status:'normal',    title:'大門片安裝及施工組裝', sub:'出工 11人（施工 7、管理 4）', alert:'' },
    { id:uid(), date:'2026-03-06', weather:'雨', status:'warn',      title:'轉角圍籬組裝及既有人行道、地坪打除', sub:'出工 12人（施工 8、管理 4）', alert:'轉角圍籬鋼板高度及網狀透空部分高度不足，與假設工程分項施工計畫圖 6-4 不符。' },
    { id:uid(), date:'2026-03-09', weather:'陰', status:'normal',    title:'人行道開挖及洗車台整地', sub:'出工 8人（施工 4、管理 4）', alert:'' },
    { id:uid(), date:'2026-03-10', weather:'陰', status:'warn',      title:'沉砂池區域既有地坪及人行道挖除及整地', sub:'出工 11人（施工 7、管理 4）', alert:'貨櫃屋既有管線與沉砂池預定位置重疊，需等改管後施作。' },
    { id:uid(), date:'2026-03-11', weather:'晴', status:'milestone', title:'人行道開挖／測量定位／洗車台整地／圍籬防溢座灌漿', sub:'140 kgf/cm²，約 120m，約 6m³　抽查：放樣、防溢座尺寸　出工 17人（施工 13、管理 4）', alert:'' },
    { id:uid(), date:'2026-03-12', weather:'晴', status:'issue',     title:'既有人行道／地坪拆除／部分區域整地', sub:'出工 14人（施工 10、管理 4）', alert:'承商未依核定土方暫置區暫置，且未設置汙染防制措施。開立改善事項通知單 10490817_0001。' },
    { id:uid(), date:'2026-03-13', weather:'晴', status:'warn',      title:'防溢座灌漿／沉砂池開挖', sub:'抽查：防溢座 140 kg/cm² 混凝土　出工 13人（施工 9、管理 4）', alert:'開挖沉砂池發現兩條既有管線，已立即通知甲方及電廠，預計下週邀集電廠進行會勘。' },
    { id:uid(), date:'2026-03-16', weather:'晴', status:'pending',   title:'沉砂池開挖／防溢座施作', sub:'出工 12人（施工 8、管理 4）', alert:'會同電廠勘查：一條初判為雨水管，另一條用途待確認。處置方案提請會議討論，本日無決議。' },
    { id:uid(), date:'2026-03-17', weather:'晴', status:'issue',     title:'沉砂池開挖／灌木區整地／防溢座施作', sub:'混凝土取樣送驗（監造會同）　出工 11人（施工 7、管理 4）', alert:'承商疑以「辦理會客」方式使未辦工作證人員入廠施工，查證後依電廠門禁規定於相關人員開始工作前驅離。' },
    { id:uid(), date:'2026-03-18', weather:'晴', status:'milestone', title:'沉砂池開挖並拆除既有埋管／灌木區整地／施工地坪清理', sub:'出工 13人（施工 9、管理 4）', alert:'' },
  ];
}

// 如果這次 session 已驗證過就自動解鎖
if (sessionStorage.getItem('tl_auth') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData(); render();
}
</script>
</body>
</html>
